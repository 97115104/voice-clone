<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Clone — Loading</title>
  <style>
    :root {
      --lime: #ccff00;
      --bg: #0a0a0a;
      --ink: #ccc;
      --muted: #888;
      --faint: #444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .panel {
      max-width: 28rem;
      width: 100%;
      text-align: center;
    }
    .brand {
      color: var(--lime);
      font-weight: 700;
      font-size: 0.875rem;
      letter-spacing: 0.05em;
      margin-bottom: 2rem;
    }
    .spinner {
      width: 2.5rem;
      height: 2.5rem;
      margin: 0 auto 1.5rem;
      border: 2px solid #1a1a1a;
      border-top-color: var(--lime);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: #eee;
    }
    .message {
      font-size: 0.8125rem;
      line-height: 1.6;
      color: var(--muted);
      margin-bottom: 1.25rem;
    }
    .detail {
      font-size: 0.75rem;
      color: var(--faint);
      line-height: 1.5;
    }
    .detail strong { color: var(--muted); font-weight: 600; }
    .error .spinner { display: none; }
    .error h1 { color: #ef4444; }
    .error .message { color: #f87171; }
  </style>
</head>
<body>
  <div class="panel" id="panel">
    <div class="brand">VOICE CLONE</div>
    <div class="spinner" id="spinner"></div>
    <h1 id="title">Loading voice model…</h1>
    <p class="message" id="message">
      First start downloads the model from Hugging Face. On CPU this can take 5–15 minutes.
    </p>
    <p class="detail" id="detail">Device: <strong id="device">…</strong></p>
  </div>
  <script>
    const panel = document.getElementById("panel");
    const title = document.getElementById("title");
    const message = document.getElementById("message");
    const detail = document.getElementById("detail");
    const deviceEl = document.getElementById("device");
    const spinner = document.getElementById("spinner");

    function showError(text) {
      panel.classList.add("error");
      spinner.style.display = "none";
      title.textContent = "Failed to load model";
      message.textContent = text;
    }

    async function poll() {
      try {
        const res = await fetch("/health");
        const data = await res.json().catch(() => ({}));

        if (data.device) deviceEl.textContent = data.device;
        if (data.message) message.textContent = data.message;

        if (res.ok && data.status === "ok") {
          title.textContent = "Ready — opening app…";
          window.location.replace("/");
          return;
        }

        if (data.status === "error") {
          showError(data.error || "Unknown error while loading the model.");
          return;
        }
      } catch {
        // Server not up yet — keep waiting
      }
      setTimeout(poll, 2000);
    }

    poll();
  </script>
</body>
</html>
