<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>Voice Clone — Loading</title>
  <style>
    :root {
      --lime: #ccff00;
      --bg: #0a0a0a;
      --ink: #ccc;
      --muted: #888;
      --faint: #444;
      --stroke: #1a1a1a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .panel {
      max-width: 28rem;
      width: 100%;
      text-align: center;
    }
    .brand {
      color: var(--lime);
      font-weight: 700;
      font-size: 0.875rem;
      letter-spacing: 0.05em;
      margin-bottom: 2rem;
    }
    .spinner {
      width: 2.5rem;
      height: 2.5rem;
      margin: 0 auto 1.5rem;
      border: 2px solid var(--stroke);
      border-top-color: var(--lime);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: #eee;
    }
    .message {
      font-size: 0.8125rem;
      line-height: 1.6;
      color: var(--muted);
      margin-bottom: 1.25rem;
    }
    .progress-wrap {
      margin-bottom: 1rem;
      text-align: left;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    .progress-bar {
      height: 0.375rem;
      background: var(--stroke);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--lime);
      border-radius: 999px;
      transition: width 0.35s ease;
    }
    .progress-detail {
      margin-top: 0.5rem;
      font-size: 0.6875rem;
      color: var(--faint);
      word-break: break-word;
    }
    .detail {
      font-size: 0.75rem;
      color: var(--faint);
      line-height: 1.5;
    }
    .detail strong { color: var(--muted); font-weight: 600; }
    .error .spinner { display: none; }
    .error h1 { color: #ef4444; }
    .error .message { color: #f87171; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="panel" id="panel">
    <div class="brand">VOICE CLONE</div>
    <div class="spinner" id="spinner"></div>
    <h1 id="title">Loading voice model…</h1>
    <p class="message" id="message">
      First start downloads the model from Hugging Face. On CPU this can take 5–15 minutes.
    </p>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-meta">
        <span id="phaseLabel">Starting…</span>
        <span id="percentLabel">0%</span>
      </div>
      <div class="progress-bar" aria-hidden="true">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-detail" id="progressDetail"></div>
    </div>
    <p class="detail" id="detail">Device: <strong id="device">…</strong></p>
  </div>
  <script>
    const panel = document.getElementById("panel");
    const title = document.getElementById("title");
    const message = document.getElementById("message");
    const deviceEl = document.getElementById("device");
    const spinner = document.getElementById("spinner");
    const phaseLabel = document.getElementById("phaseLabel");
    const percentLabel = document.getElementById("percentLabel");
    const progressFill = document.getElementById("progressFill");
    const progressDetail = document.getElementById("progressDetail");

    function formatBytes(n) {
      if (!n) return "0 B";
      const units = ["B", "KB", "MB", "GB"];
      let value = n;
      let unit = 0;
      while (value >= 1024 && unit < units.length - 1) {
        value /= 1024;
        unit++;
      }
      return `${value.toFixed(unit === 0 ? 0 : 1)} ${units[unit]}`;
    }

    function phaseText(phase) {
      switch (phase) {
        case "starting": return "Starting…";
        case "downloading": return "Downloading model files";
        case "loading": return "Loading weights into memory";
        case "warming up": return "Warming up model";
        case "ready": return "Ready";
        default: return "Preparing";
      }
    }

    function updateProgress(progress) {
      if (!progress) return;
      const pct = Math.max(0, Math.min(100, progress.percent || 0));
      percentLabel.textContent = `${pct}%`;
      progressFill.style.width = `${pct}%`;
      phaseLabel.textContent = phaseText(progress.phase);

      const parts = [];
      if (progress.phase === "downloading") {
        if (progress.files_total) {
          parts.push(`File ${Math.min(progress.files_done + 1, progress.files_total)} of ${progress.files_total}`);
        }
        if (progress.current_file) parts.push(progress.current_file);
        if (progress.bytes_total) {
          parts.push(`${formatBytes(progress.bytes_done)} / ${formatBytes(progress.bytes_total)}`);
        }
      } else if (progress.current_file) {
        parts.push(progress.current_file);
      }
      progressDetail.textContent = parts.join(" · ");
    }

    function showError(text) {
      panel.classList.add("error");
      spinner.style.display = "none";
      title.textContent = "Failed to load model";
      message.textContent = text;
    }

    let pollTimer = null;
    let pollInFlight = false;
    let done = false;

    async function tick() {
      if (done || pollInFlight) return;
      pollInFlight = true;
      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 5000);
        const res = await fetch("/health", { cache: "no-store", signal: controller.signal });
        clearTimeout(timeout);
        const data = await res.json().catch(() => ({}));

        if (data.device) deviceEl.textContent = data.device;
        if (data.message) message.textContent = data.message;
        if (data.progress) updateProgress(data.progress);

        if (res.ok && data.status === "ok") {
          done = true;
          if (pollTimer) clearInterval(pollTimer);
          title.textContent = "Ready — opening app…";
          updateProgress({ phase: "ready", percent: 100 });
          // Bust any cached loading page at / before swapping to the main UI.
          window.location.replace(`/?_=${Date.now()}`);
          return;
        }

        if (data.status === "error") {
          done = true;
          if (pollTimer) clearInterval(pollTimer);
          showError(data.error || "Unknown error while loading the model.");
          return;
        }
      } catch {
        // Server not up yet, request timed out, or connection reset — retry.
      } finally {
        pollInFlight = false;
      }
    }

    pollTimer = setInterval(tick, 1000);
    tick();
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) tick();
    });
  </script>
</body>
</html>
