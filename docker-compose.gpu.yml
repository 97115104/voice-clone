# GPU override — use: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up --build
services:
  voice-clone:
    build:
      args:
        TORCH_INDEX: https://download.pytorch.org/whl/cu124
    environment:
      TTS_DEVICE: cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
